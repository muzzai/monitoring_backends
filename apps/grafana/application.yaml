apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/grafana-community/helm-charts.git
      targetRevision: grafana-11.2.3
      path: charts/grafana
      helm:
        valueFiles:
          - $values/apps/grafana/values.yaml
    - repoURL: git@github.com:muzzai/monitoring_backends.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

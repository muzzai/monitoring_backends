apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-logs-cluster
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/VictoriaMetrics/helm-charts.git
      targetRevision: victoria-logs-cluster-0.0.27
      path: charts/victoria-logs-cluster
      helm:
        valueFiles:
          - $values/apps/victoria-logs-cluster/values.yaml
    - repoURL: git@github.com:muzzai/monitoring_backends.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

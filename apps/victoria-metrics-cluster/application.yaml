apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics-cluster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/VictoriaMetrics/helm-charts.git
    targetRevision: victoria-metrics-cluster-0.35.0
    path: charts/victoria-metrics-cluster
    helm:
      valueFiles:
        # Path relative to the Helm chart root — adjust if using a multi-source setup
        - $values/apps/victoria-metrics-cluster/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
